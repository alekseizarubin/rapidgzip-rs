name: Windows Native Diagnostics

on:
  workflow_dispatch:

jobs:
  native-msvc-x64-diagnostics:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NASM
        run: choco install -y nasm

      - name: Export NASM to PATH
        shell: pwsh
        run: |
          "C:\\Program Files\\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Windows toolchain
        shell: pwsh
        run: |
          where.exe cmake
          where.exe nasm
          cmake --version
          nasm -v

      - name: Configure native CMake build
        shell: pwsh
        run: |
          cmake -S crates/rapidgzip-sys/native/rapidgzip-capi -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DLIBRAPIDARCHIVE_WITH_ISAL=ON

      - name: Build native target with verbose logs
        shell: pwsh
        run: |
          cmake --build build --config Release --target rapidgzip-capi --parallel 4 -- /verbosity:detailed

      - name: Upload CMake logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-diagnostics-logs
          path: |
            build/CMakeCache.txt
            build/CMakeFiles/CMakeConfigureLog.yaml
