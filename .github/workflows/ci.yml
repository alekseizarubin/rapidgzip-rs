name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential zlib1g-dev nasm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run workspace tests
        run: cargo test --workspace

  build-cross-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace
